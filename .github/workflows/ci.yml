name: Spring Boot CI Pipeline

on:
  push:
    branches: [ "feat/github-ci" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Run Tests
    runs-on: ubuntu-latest

    # 1. Use a PostgreSQL Service Container
    services:
      postgres:
        image: postgres:15 # Match this to the major version you use on Render
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        # 2. The Health Check Barrier
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
      # Grant perms
    - name: Grant execute permission for mvnw
      run: chmod +x mvnw

    # 3. Executing with Localized Context
    - name: Run Tests
      env:
        # override application's env with local container's credentials
        DB_URL: jdbc:postgresql://localhost:5432/testdb
        DB_USERNAME: testuser
        DB_PASSWORD: testpassword
      run: ./mvnw clean test -B --no-transfer-progress -Dspring.profiles.active=test