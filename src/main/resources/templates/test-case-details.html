<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Case Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;700;900&display=swap" rel="stylesheet">
</head>

<body class="bg-[#181818] text-white">
    <div class="min-h-screen">
        <header class="sticky top-0 z-20 border-b border-white/10 bg-[#1f1f1f]/95 backdrop-blur">
            <div class="w-full px-6 sm:px-8 py-4 flex items-center justify-between gap-3">
                <div class="min-w-0">
                    <p class="text-xs uppercase tracking-wider text-white/45" style="font-family: 'Work Sans', sans-serif; font-weight: 700;" th:text="${detailsPageTitle}">Test case details</p>
                    <h1 class="text-base sm:text-lg font-semibold text-white/85 mt-1 truncate">
                        <span class="text-white/55">ID</span>
                        <span class="ml-2" th:text="${detailsCaseId}">TC-0001</span>
                    </h1>
                </div>
                <a href="/workspace" class="shrink-0 px-4 py-2 border border-white/20 hover:border-[#E7FF02] hover:text-[#E7FF02] transition-colors text-sm">
                    Back to workspace
                </a>
            </div>
        </header>

        <main class="w-full px-6 sm:px-8 py-8">
            <section class="max-w-5xl mx-auto border border-white/10 bg-[#212121] p-5 sm:p-6">
                <p class="text-xs uppercase tracking-wider text-white/45" style="font-family: 'Work Sans', sans-serif; font-weight: 700;">Phase 1 scaffold</p>
                <p class="mt-3 text-sm text-white/75">
                    This standalone details route is now live and publicly reachable. Full field rendering and final UX sections are coming in the next phases.
                </p>

                <div class="mt-5 grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                    <div class="border border-white/10 bg-white/[0.03] p-4">
                        <p class="text-xs text-white/45">Route parameter</p>
                        <p class="mt-1 text-white/85" th:text="${detailsCaseId}">TC-0001</p>
                    </div>
                    <div class="border border-white/10 bg-white/[0.03] p-4">
                        <p class="text-xs text-white/45">Data plumbing</p>
                        <p class="mt-1 text-white/85" th:text="${detailsIsPlaceholder} ? 'Placeholder mode' : 'Live data mode'">Placeholder mode</p>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
