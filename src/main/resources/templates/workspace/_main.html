<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
	<th:block th:fragment="mainContent">
		<main class="w-full px-0 sm:px-0 flex-1 min-h-0 flex flex-col">
			<div class="flex flex-1 min-h-0">
				<aside id="wsSidebar" class="w-[18rem] sm:w-[20rem] border-r border-white/10 bg-black shrink-0 self-stretch min-h-0 flex flex-col">
					<div id="wsSidebarInner" class="px-6 py-5 flex-1 min-h-0 flex flex-col">
						<div id="wsSidebarHeader" class="flex items-center justify-between gap-3">
							<div class="flex items-center gap-2">
								<button
									id="wsNewFolderButton"
									type="button"
									class="px-2 py-1 border border-white/20 hover:border-[#E7FF02] hover:text-[#E7FF02] transition-colors text-[10px] uppercase tracking-wider text-white/75"
								>
									New Folder
								</button>
								<button
									id="wsNewTestcaseButton"
									type="button"
									class="px-2 py-1 border border-white/20 hover:border-[#E7FF02] hover:text-[#E7FF02] transition-colors text-[10px] uppercase tracking-wider text-white/75"
								>
									New Testcase
								</button>
							</div>
							<p id="wsSidebarTitle" class="text-[11px] uppercase tracking-wider text-white/45 whitespace-nowrap" style="font-family: 'Work Sans', sans-serif; font-weight: 700;">
								Test cases:
								<span id="wsTotalCount" class="text-white/70" th:text="${testCaseCount != null ? testCaseCount : '-'}">-</span>
							</p>
						</div>
						<form id="wsNewTestcaseForm" class="mt-3 hidden border border-white/15 bg-white/[0.03] p-2" aria-label="Create new testcase">
							<label class="sr-only" for="wsNewTestcaseId">Testcase ID</label>
							<input id="wsNewTestcaseId" type="text" class="w-full mb-2 bg-black border border-white/20 px-2 py-1 text-xs text-white focus:outline-none focus:border-[#E7FF02]" placeholder="Testcase ID" />
							<label class="sr-only" for="wsNewTestcaseName">Testcase Name</label>
							<input id="wsNewTestcaseName" type="text" class="w-full bg-black border border-white/20 px-2 py-1 text-xs text-white focus:outline-none focus:border-[#E7FF02]" placeholder="Testcase name" />
							<div class="mt-2 flex items-center justify-end gap-2">
								<button id="wsNewTestcaseCancel" type="button" class="px-2 py-1 border border-white/20 hover:border-white/40 text-white/85 hover:text-white transition-colors text-[10px] uppercase tracking-wider">
									Cancel
								</button>
								<button id="wsNewTestcaseSubmit" type="submit" class="px-2 py-1 border border-white/20 hover:border-[#E7FF02] hover:text-[#E7FF02] transition-colors text-[10px] uppercase tracking-wider text-white/75">
									Create
								</button>
							</div>
						</form>
						<div id="wsSidebarContent" class="mt-4 flex-1 min-h-0 overflow-y-auto overflow-x-hidden pr-1" aria-label="Folder tree">
							<div id="wsFolderLoading" class="hidden text-xs text-white/45" aria-hidden="true">Loading folders...</div>
							<div id="wsFolderEmpty" class="hidden text-xs text-white/45">No folders found.</div>
							<nav id="wsFolderTree" class="mt-2 space-y-1"></nav>
						</div>
					</div>
				</aside>
				<div
					id="wsSidebarResizeHandle"
					class="w-2 shrink-0 cursor-col-resize bg-white/10 hover:bg-[#E7FF02]/70 transition-colors"
					role="separator"
					aria-label="Resize directory sidebar"
					aria-orientation="vertical"
				></div>

				<section class="flex-1 min-w-0 min-h-0 flex flex-col">
					<div id="wsGridFrame" class="flex-1 min-h-0 overflow-y-auto overflow-x-hidden">
						<table id="wsGridTable" class="w-full table-fixed text-sm">
							<thead class="text-white/50">
								<tr class="border-b border-white/10">
									<th class="px-2 sm:px-4 py-3 w-10"></th>
									<th class="px-2 sm:px-3 py-3 w-10">
										<input id="wsSelectAll" type="checkbox" class="h-4 w-4 accent-[#E7FF02]" aria-label="Select all" />
									</th>
									<th class="text-left px-3 sm:px-6 py-3 font-medium">Title</th>
									<th class="text-left px-3 sm:px-6 py-3 font-medium w-28">Status</th>
									<th class="text-left px-3 sm:px-6 py-3 font-medium w-44">Tags</th>
									<th class="text-left pl-3 pr-6 sm:pl-6 sm:pr-4 py-3 font-medium w-44">Last updated</th>
									<th class="text-right pl-0 pr-20 sm:pr-20 py-3 font-medium w-44">Actions</th>
								</tr>
							</thead>
							<tbody id="wsTbody" class="text-white/75">
								<tr id="wsLoadingRow" class="border-b border-white/10">
									<td class="px-6 sm:px-8 py-6" colspan="7">
										<p class="text-sm text-white/45">Loading test cases...</p>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				</section>
			</div>
			<div id="wsGridFooter" class="px-6 sm:px-8 py-4 border-t border-white/10 flex items-center justify-between gap-3">
				<p id="wsPageInfo" class="text-xs text-white/45">Page 1 of 1</p>
				<div class="flex items-center gap-2">
					<button id="wsCollapsePreviews" type="button" class="hidden px-3 py-2 border border-white/20 hover:border-[#E7FF02] hover:text-[#E7FF02] transition-colors text-[11px] uppercase tracking-wider text-white/70">
						Collapse all previews
					</button>
					<button id="wsPrevPage" type="button" class="px-3 py-2 border border-white/20 hover:border-[#E7FF02] hover:text-[#E7FF02] transition-colors text-xs disabled:opacity-40 disabled:cursor-not-allowed">
						Previous
					</button>
					<button id="wsNextPage" type="button" class="px-3 py-2 border border-white/20 hover:border-[#E7FF02] hover:text-[#E7FF02] transition-colors text-xs disabled:opacity-40 disabled:cursor-not-allowed">
						Next
					</button>
				</div>
			</div>
		</main>
	</th:block>
</body>
</html>
