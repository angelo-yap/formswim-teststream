<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Workspace</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;700;900&display=swap" rel="stylesheet">
	<meta name="workspace-api-base" content="/api/testcases">
	<meta name="workspace-export-base" content="/workspace/export">
	<meta name="_csrf" th:content="${_csrf.token}">
	<meta name="_csrf_header" th:content="${_csrf.headerName}">
	<meta name="workspace-components-base" content="/api/components">
	<meta name="workspace-statuses-base" content="/api/statuses">
	<meta name="workspace-tags-base" content="/api/tags">
	<style>
		.ws-row-selected {
			background-color: rgba(231, 255, 2, 0.2) !important;
			box-shadow: inset 0 0 0 1px rgba(231, 255, 2, 0.9);
		}

		.ws-folder-drop-hover {
			border-color: rgba(231, 255, 2, 0.95) !important;
			background-color: rgba(231, 255, 2, 0.24) !important;
			box-shadow: 0 0 0 1px rgba(231, 255, 2, 0.55), 0 10px 25px rgba(231, 255, 2, 0.12);
			color: rgba(255, 255, 255, 0.98) !important;
			transform: translateX(1px);
		}

		#wsTbody .ws-row,
		#wsTbody .ws-preview-row {
			border-bottom-color: rgba(255, 255, 255, 0.38) !important;
		}

		.ws-preview-open td {
			background: rgba(255, 255, 255, 0.02);
		}

		.ws-preview-selected td {
			background: rgba(231, 255, 2, 0.08);
		}

		.ws-row-expanded {
			border-bottom-color: rgba(255, 255, 255, 0.06) !important;
		}

		.ws-preview-row {
			border-top: 0;
		}

		.ws-preview-row td {
			padding-top: 0 !important;
		}

		.ws-preview-card {
			border-top: 1px solid rgba(255, 255, 255, 0.08);
		}
	</style>
</head>

<body class="bg-black text-white">
	<div class="min-h-screen">
		<th:block th:replace="~{workspace/_header :: header}"></th:block>
		<th:block th:replace="~{workspace/_notices :: notices}"></th:block>
		<th:block th:replace="~{workspace/_main :: mainContent}"></th:block>
	</div>

	<th:block th:replace="~{workspace/_bulk-bar :: bulkBar}"></th:block>
	<th:block th:replace="~{workspace/_organize-modal :: organizeModal}"></th:block>
	<th:block th:replace="~{workspace-bulk-edit-modal :: bulkEditModal}"></th:block>
	<th:block th:replace="~{workspace/_drawer :: drawer}"></th:block>

	<script type="module" th:src="@{/js/workspace/page.js}"></script>
</body>

</html>
