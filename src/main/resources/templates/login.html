<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestStream - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#1E1E1E] text-white">
    <div class="min-h-screen flex items-center justify-center">
        <div class="w-full max-w-md px-8 py-8 border border-white/10 bg-[#242424]">
            <div class="mb-12 text-center">
                <h1 class="text-3xl tracking-tight text-white mb-2 uppercase" style="font-family: 'Work Sans', sans-serif; font-weight: 900;">
                    TestStream
                </h1>
                <div class="w-16 h-1 mx-auto" style="background-color: #E7FF02;"></div>
            </div>

            <form th:action="@{/login}" method="POST" class="space-y-6">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                
                <div th:if="${errorMessage}" class="p-3 bg-red-500/10 border border-red-500 text-red-500 text-sm rounded text-center" th:text="${errorMessage}"></div>
                <div th:if="${successMessage}" class="p-3 bg-emerald-500/10 border border-emerald-500 text-emerald-400 text-sm rounded text-center" th:text="${successMessage}"></div>
                <div th:if="${logoutMessage}" class="p-3 bg-white/10 border border-white/20 text-white text-sm rounded text-center" th:text="${logoutMessage}"></div>

                <div th:if="${generatedTeamCode}" class="p-4 bg-white/5 border border-white/20 text-white rounded">
                    <div class="text-sm text-white/70">Your new team code</div>
                    <div class="mt-2 flex items-center justify-between gap-3">
                        <div class="font-mono text-lg tracking-widest" id="teamCodeValue" th:text="${generatedTeamCode}"></div>
                        <button
                            type="button"
                            class="shrink-0 py-2 px-3 text-black font-bold transition-all hover:opacity-80"
                            style="background-color: #E7FF02;"
                            onclick="copyTeamCode()"
                            id="copyTeamCodeButton"
                        >
                            Copy
                        </button>
                    </div>
                    <div class="mt-2 text-xs text-white/60" id="copyTeamCodeStatus" aria-live="polite"></div>
                </div>

                <div>
                    <label for="email" class="block text-white mb-2 font-semibold">
                        Email
                    </label>
                    <input
                        type="email"
                        id="email"
                        name="email" 
                        required
                        autocomplete="email"
                        class="w-full px-4 py-3 bg-[#2B2B2B] text-white border border-white/30 focus:border-[#E7FF02] focus:outline-none transition-colors placeholder:text-white/40"
                        placeholder="your@email.com"
                    />
                </div>

                <div>
                    <label for="password" class="block text-white mb-2 font-semibold">
                        Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        autocomplete="current-password"
                        class="w-full px-4 py-3 bg-[#2B2B2B] text-white border border-white/30 focus:border-[#E7FF02] focus:outline-none transition-colors placeholder:text-white/40"
                        placeholder="••••••••"
                    />
                </div>

                <button
                    type="submit"
                    class="w-full py-3 px-4 text-black font-bold transition-all hover:opacity-80"
                    style="background-color: #E7FF02;"
                >
                    Sign In
                </button>

                <div class="flex justify-between text-sm mt-4">
                    <a href="#" class="text-white/60 hover:text-white transition-colors">
                        Forgot password?
                    </a>
                    <a th:href="@{/register}" class="text-[#E7FF02] hover:opacity-80 transition-colors">
                        Don't have an account? Register
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        async function copyTeamCode() {
            const valueEl = document.getElementById('teamCodeValue');
            const statusEl = document.getElementById('copyTeamCodeStatus');
            const buttonEl = document.getElementById('copyTeamCodeButton');
            const teamCode = valueEl ? valueEl.textContent.trim() : '';

            if (!teamCode) {
                if (statusEl) statusEl.textContent = 'No team code found.';
                return;
            }

            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(teamCode);
                } else {
                    const input = document.createElement('input');
                    input.value = teamCode;
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand('copy');
                    document.body.removeChild(input);
                }

                if (statusEl) statusEl.textContent = 'Copied to clipboard.';
                if (buttonEl) buttonEl.textContent = 'Copied';
                setTimeout(() => {
                    if (buttonEl) buttonEl.textContent = 'Copy';
                }, 1200);
            } catch (e) {
                if (statusEl) statusEl.textContent = 'Copy failed. Please select and copy manually.';
            }
        }
    </script>
</body>
</html>
