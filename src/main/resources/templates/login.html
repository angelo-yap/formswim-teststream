<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestStream - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@900&display=swap" rel="stylesheet">
</head>
<body class="bg-black">
    <div class="min-h-screen flex items-center justify-center">
        <div class="w-full max-w-md px-8">
            <div class="mb-12 text-center">
                <h1 class="text-3xl tracking-tight text-white mb-2 uppercase" style="font-family: 'Work Sans', sans-serif; font-weight: 900;">
                    TestStream
                </h1>
                <div class="w-16 h-1 mx-auto" style="background-color: #E7FF02;"></div>
            </div>

            <form th:action="@{/login}" method="POST" class="space-y-6">
                
                <div th:if="${param.error}" class="p-3 bg-red-500/10 border border-red-500 text-red-500 text-sm rounded text-center">
                    Invalid email or password.
                </div>

                <div>
                    <label for="email" class="block text-white mb-2 font-semibold">
                        Email
                    </label>
                    <input
                        type="email"
                        id="email"
                        name="email" 
                        required
                        class="w-full px-4 py-3 bg-black text-white border border-white/30 focus:border-[#E7FF02] focus:outline-none transition-colors placeholder:text-white/40"
                        placeholder="your@email.com"
                    />
                </div>

                <div>
                    <label for="password" class="block text-white mb-2 font-semibold">
                        Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        class="w-full px-4 py-3 bg-black text-white border border-white/30 focus:border-[#E7FF02] focus:outline-none transition-colors placeholder:text-white/40"
                        placeholder="••••••••"
                    />
                </div>

                <button
                    type="submit"
                    class="w-full py-3 px-4 text-black font-bold transition-all hover:opacity-80"
                    style="background-color: #E7FF02;"
                >
                    Sign In
                </button>

                <div class="flex justify-between text-sm mt-4">
                    <a href="#" class="text-white/60 hover:text-white transition-colors">
                        Forgot password?
                    </a>
                    <a th:href="@{/register}" class="text-[#E7FF02] hover:opacity-80 transition-colors">
                        Don't have an account? Register
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
