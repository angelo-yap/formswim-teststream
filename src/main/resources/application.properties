spring.application.name=teststream
spring.config.import=optional:file:.env[.properties]
server.tomcat.accesslog.enabled=true

server.forward-headers-strategy=framework
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.servlet.session.timeout=30m

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Ignore editor warnings, these flags are implemented :) 
# Bulk edit rollout controls.
# Keep disabled until search scalability work is deployed.
teststream.bulk-edit.enabled=true
# Safety cap for number of requested work keys in one bulk edit call.
teststream.bulk-edit.max-work-keys=5000